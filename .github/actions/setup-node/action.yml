name: Setup Node
description: Setup Node.js environment and install dependencies
runs:
  using: composite
  steps:
    - uses: actions/setup-node@v6
      with:
        node-version-file: .nvmrc
        cache: 'pnpm'
        cache-dependency-path: pnpm-lock.yaml
    - uses: pnpm/action-setup@v4
      with:
        run_install: false
    - run: pnpm install
      shell: bash
