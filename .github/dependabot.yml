version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'monthly'
    ignore:
      # Ignores any major updates
      - dependency-name: '*'
        update-types: ['version-update:semver-major']
      # Ignores the entire Adobe react-aria family — versions across
      # @react-aria/*, @react-stately/*, @react-types/* and react-aria
      # are tightly coupled and must be upgraded together manually
      - dependency-name: 'react-aria'
      - dependency-name: 'react-aria-components'
      - dependency-name: '@react-aria/*'
      - dependency-name: '@react-stately/*'
      - dependency-name: '@react-types/*'
    groups:
      eslint:
        patterns:
          - 'eslint'
          - 'eslint-*'
          - '@eslint/*'
          - 'typescript-eslint'
          - '@typescript-eslint/*'
          - 'globals'
      prettier:
        patterns:
          - 'prettier*'
      stylelint:
        patterns:
          - 'stylelint*'
      storybook:
        patterns:
          - 'storybook*'
          - '@storybook/*'
          - '@chromatic-com/storybook*'
          - '@vueless/storybook-*'
      testing:
        patterns:
          - 'vitest*'
          - '@vitest/*'
          - '@testing-library/*'
          - 'jsdom'
      vite:
        patterns:
          - 'vite'
          - 'vite-*'
          - '@vitejs/*'
      react:
        patterns:
          - 'react*'
          - '@types/react*'
      commitlint:
        patterns:
          - '@commitlint/*'
      svgr:
        patterns:
          - '@svgr/*'
      figma:
        patterns:
          - '@figma-export/*'
      postcss:
        patterns:
          - 'postcss*'
      koobiq:
        patterns:
          - '@koobiq/*'
